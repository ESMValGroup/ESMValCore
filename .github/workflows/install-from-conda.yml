---
name: Install from Conda

permissions: {}

# runs on a push on main and at the end of every day
on:
  push:
    branches:
      - main
      - pixi
  schedule:
    - cron: "0 4 * * *"

# Required shell entrypoint to have properly configured bash shell
defaults:
  run:
    shell: bash -l {0}

jobs:
  install:
    runs-on: ${{ matrix.os }}
    if: github.repository == 'ESMValGroup/ESMValCore'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]
    name: Install ESMValCore with Python ${{ matrix.python-version }} on ${{ matrix.os }}
    steps:
      - name: Install Micromamba
        run: |
          "${SHELL}" <(curl -L micro.mamba.pm/install.sh)
      - name: Install ESMValCore
        run: micromamba create -n esmvalcore esmvalcore python=${{ matrix.python-version }}
      - name: Verify installation
        run: |
          eval "$(micromamba shell activate esmvalcore)"
          pip check
          esmvaltool --help
          esmvaltool version
