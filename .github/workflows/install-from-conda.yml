---
name: Install from Conda

permissions: {}

# runs on a push on main and at the end of every day
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"

# Required shell entrypoint to have properly configured bash shell
defaults:
  run:
    shell: bash -l {0}

jobs:
  install:
    runs-on: ${{ matrix.os }}
    if: github.repository == 'ESMValGroup/ESMValCore'
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"
    name: Install ESMValCore with Python ${{ matrix.python-version }} on ${{ matrix.os }}
    steps:
      - uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476  # v3.0.0
        with:
          environment-name: esmvalcore
          create-args: >-
            python=${{ matrix.python-version }}
            esmvalcore
      - name: Verify installation
        run: |
          pip check
          esmvaltool --help
          esmvaltool version
