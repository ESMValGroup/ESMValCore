# Read data from the IFW model in its native format.
projects:
  IFW:
    data:
      type: esmvalcore.io.local.LocalDataSource
      rootpath: ~/climate_data
      dirname_template: "{dataset}/{short_name}"
      filename_template: "{dataset}_*_{fstep}.nc"
    cmor_table:
      type: esmvalcore.cmor.table.CMIP6Info
      strict: false
      paths:
        - cmip6/Tables
        - cmip6-custom
    preprocessor_filename_template: "{project}_{dataset}_{mip}_{short_name}_{fstep}"
